<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>yeek-frontend</title>
  </head>
  <body>
    <script>
      try {
        var s = localStorage.getItem('yeek:font-size');
        document.documentElement.style.zoom = (s ? JSON.parse(s) : 16) / 14;
      } catch(e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
